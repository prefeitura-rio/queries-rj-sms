name: DBT Create Command

on:
  pull_request:
    types: [synchronize, opened, reopened]

jobs:
  dbt_run:
    runs-on: ubuntu-latest
    # Improvement #4: Add a timeout of 30 mins
    # [Ref] https://ashishb.net/programming/common-pitfalls-of-github-actions/
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Precisamos de origin/master pra calcular o git diff abaixo; mas não é possível
      # puxar ela junto do checkout acima (vide https://github.com/actions/checkout/issues/329)
      # Então aqui fazemos um fetch:
      - name: Fetch origin/master
        run: git fetch origin master:master --depth=1

      - name: Get changed files
        id: files
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }} HEAD | xargs)
          echo "all=$FILES" >> $GITHUB_OUTPUT

      - name: Create DBT Run Command
        id: create-dbtrun-command
        continue-on-error: true
        run: |
          python .github/workflows/scripts/create_dbt_run_command.py "${{ steps.files.outputs.all }}"
        env:
          GITHUB_OUTPUT: $GITHUB_ENV

      - name: Delete previous comments
        uses: izhangzhihao/delete-comment@d075704468e1cf74e60944d9f335351213c34d85  # sem versão
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          delete_user_name: github-actions[bot]
          issue_number: ${{ github.event.number }}

      - name: Comment PR
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b  # v3.0.1
        with:
          file-path: ./message.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
