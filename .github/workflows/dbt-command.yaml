name: DBT Create Command

on:
  pull_request:
    types: [synchronize, opened, reopened]

jobs:
  dbt_run:
    runs-on: ubuntu-latest
    # Improvement #4: Add a timeout of 30 mins
    # [Ref] https://ashishb.net/programming/common-pitfalls-of-github-actions/
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Get changed files
        id: files
        uses: Ana06/get-changed-files@25f79e676e7ea1868813e21465014798211fad8c  # v2.3.0

      - name: Create DBT Run Command
        id: create-dbtrun-command
        continue-on-error: true
        run: |
          python .github/workflows/scripts/create_dbt_run_command.py "${{ steps.files.outputs.all }}"
        env:
          GITHUB_OUTPUT: $GITHUB_ENV

      - name: Delete previous comments
        uses: izhangzhihao/delete-comment@d075704468e1cf74e60944d9f335351213c34d85  # sem versão
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          delete_user_name: github-actions[bot]
          issue_number: ${{ github.event.number }}

      - name: Comment PR
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b  # v3.0.1
        with:
          file-path: ./message.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
