    description: "Razão social do estabelecimento."

  - name: ap
    description: "Área Programática normalizada em formato inteiro: 10, 21, 22, 31, 32, 33, 40, 51, 52 ou 53. Valores não reconhecidos recebem null."

  - name: ap_formatada
    description: "Área Programática formatada com ponto: 1.0, 2.1, 2.2, 3.1, 3.2, 3.3, 4.0, 5.1, 5.2 ou 5.3."

