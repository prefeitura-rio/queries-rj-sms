- name: int_subpav_cnes_aps__profissionais_consolidacao
  description: >-
    Modelo intermediário consolidado de profissionais do CNES APS. Integra vínculos profissional-unidade-CBO com vínculos profissional-equipe, preservando o vínculo de equipe quando ele existe e usando o vínculo profissional-unidade para enriquecer carga horária, conselho, preceptoria, residência e dados complementares.


    A chave principal de deduplicação considera data_particao, profissional, unidade, CBO e INE. Quando não há vínculo com equipe, o INE permanece nulo e o registro continua válido como vínculo profissional-unidade. O campo possui_vinculo_equipe indica se o registro entra nas regras de composição de equipes. O campo inconsistente sinaliza múltiplo vínculo ativo do mesmo CPF, CNES e CBO em mais de uma equipe na mesma competência.

