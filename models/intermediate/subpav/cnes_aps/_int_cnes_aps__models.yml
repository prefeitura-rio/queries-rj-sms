  - name: classificacao_equipe
    description: >
      Classificação ampla da equipe segundo agrupamento CNES, sem aplicação das regras temporais do Panorama. Possíveis valores incluem ESF, EACS, ESB, ECR, EAP, ENASF, EAPP, EMAD, EMAP e OUTROS.

  - name: classificacao_equipe_temporal
    description: >
      Classificação da equipe considerando as regras temporais de tipologia CNES, especialmente a distinção entre período anterior e posterior a 2020-05.

  - name: classificacao_equipe_painel
    description: >
      Classificação baseada na tipologia atual do painel, usada principalmente para interpretação das equipes do período recente.

  - name: equipe_ativa
    description: "Flag indicando se a equipe está ativa. Valor 1 quando dt_desativacao é nula; caso contrário, 0."

  - name: is_esf
    description: >
      Flag ampla indicando se a equipe é classificada como ESF segundo a regra temporal do CNES. No período antigo, considera tipos ESF históricos; no período atual, considera tipo de equipe 70.

  - name: is_esf_panorama_historico
    description: >
      Flag específica para reprodução do campo ESF do Panorama na série histórica. Até 2020-04, considera ESF, EACS e ECR conforme regra do histórica. A partir de 2020-05, considera apenas ESF.

  - name: is_eacs
    description: "Flag ampla indicando se a equipe é classificada como EACS segundo o CNES."

  - name: is_eacs_panorama_historico
    description: >
      Flag específica para reprodução do campo EACS no Panorama histórico. Recebe 1 apenas para equipes EACS em competências anteriores a 2020-05; no período atual, o campo EACS do Panorama deve permanecer 0.

  - name: is_esb
    description: >
      Flag indicando se a equipe é classificada como Equipe de Saúde Bucal, considerando a regra temporal do CNES.

  - name: is_ecr
    description: >
      Flag indicando se a equipe é classificada como Equipe de Consultório na Rua, considerando a regra temporal do CNES.

  - name: is_enasf
    description: >
      Flag indicando se a equipe é classificada como ENASF/NASF, considerando a regra temporal do CNES.

  - name: is_eap
    description: >
      Flag indicando se a equipe é classificada como Equipe de Atenção Primária, considerando a regra temporal do CNES.

  - name: is_eapp
    description: >
      Flag ampla indicando se a equipe é classificada como Equipe de Atenção Primária Prisional segundo o CNES.

  - name: is_eapp_panorama
    description: >
      Flag específica para reprodução do campo EAPP do Panorama. Para tipo_equipe_id 74, remove equipes cujo nome de referência contém PSIC, evitando contagem duplicada das equipes prisionais. Preserva is_eapp como leitura ampla do CNES.

  - name: is_emad
    description: "Flag ampla indicando se a equipe é classificada como EMAD segundo o CNES."

  - name: is_emad_panorama
    description: >
      Flag específica para reprodução do campo EMAD do Panorama. Considera EMAD municipal ou unidades com nome iniciado por SMS PADI, preservando is_emad como leitura ampla do CNES.

  - name: is_emap
    description: "Flag indicando se a equipe é classificada como EMAP segundo o CNES."

  - name: is_equipe_aps_painel
    description: >
      Flag para regra atual do painel, considerando equipes dos tipos 70, 76 e 73 como equipes APS. Não deve ser usada isoladamente para série histórica antiga.

  - name: is_equipe_aps_cobertura
    description: >
      Flag para cálculo de cobertura APS no período recente, considerando equipes dos tipos 70, 76 e 73.

  - name: is_equipe_aps_historico
    description: >
      Flag oficial para contagem histórica do campo APS. Até 2020-04, considera ESF, EACS e ECR. A partir de 2020-05, considera ESF, EAP e ECR.

  - name: is_aps
    description: >
      Flag ampla indicando se a equipe pertence a algum tipo relacionado à APS no CNES. Esta flag é exploratória e não deve substituir is_equipe_aps_historico nos indicadores do Panorama.

  - name: tipo_unidade_sms
    description: "Classificação SMS da unidade vinculada à equipe."

  - name: is_unidade_aps_panorama
    description: "Flag da unidade vinculada indicando se ela entra no quadro de Unidades APS do Panorama."

