    description: Total de profissionais ativos com carga horária ambulatorial maior ou igual a 20 e menor que 40 horas. Nas linhas sintéticas, o valor é 0.
  - name: total_desligados
    description: Total de registros com data de desligamento preenchida. Nas linhas sintéticas, o valor é 0.
  - name: total_dias_desligados
    description: "Quantidade de dias desde a data calculada de incompletude até o último dia da competência. Nas linhas sintéticas, representa o tempo de ausência da categoria obrigatória.\n"
  - name: data_eqp_vacancia
    description: "Data de referência de vacância da categoria profissional ausente. É preenchida quando a ausência está dentro da janela de até 60 dias, conforme regra usada para vacância.\n"
  - name: data_eqp_incompleta
    description: "Data calculada de início da incompletude da categoria obrigatória na equipe. É preenchida nas linhas sintéticas de categoria ausente.\n"
  - name: inconsistente
    description: "Flag de inconsistência herdada das linhas originais. Nas linhas sintéticas de categoria ausente, é preenchida como 0.\n"
  - name: origem_linha_qpe
    description: "Origem da linha no modelo. ORIGINAL indica linha proveniente do quantitativo de profissionais; SINTETICA_CBO_AUSENTE indica linha criada para representar uma categoria obrigatória ausente.\n"
- name: int_subpav_cnes_aps__composicao_equipes
  description: "Modelo intermediário de composição, completude e incompletude das equipes APS. Consolida os quantitativos por equipe a partir do modelo de QPE com categorias ausentes e aplica as regras de composição de eSF, APS e eSB.\n\nPara eSF, considera completa a equipe que possui médico válido, enfermeiro, técnico ou auxiliar de enfermagem e ACS conforme a regra temporal aplicável. Para a categoria médica, considera válido 1 médico com 40h ou 2 médicos com 20h. A incompletude é calculada por categoria profissional obrigatória, com impacto após ausência superior a 60 dias.\n\nPara eSB, considera completa a equipe com cirurgião-dentista e auxiliar ou técnico de saúde bucal. O modelo também expõe diagnósticos de ausência de cirurgião-dentista, ausência de auxiliar/técnico bucal e inexistência após 60 dias."
