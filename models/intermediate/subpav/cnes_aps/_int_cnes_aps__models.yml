- name: int_subpav_cnes_aps__equipes_profissionais
  description: >
    Modelo intermediário de vínculos entre profissionais e equipes do CNES APS. Consolida os registros da LFCES038, enriquecendo com dados cadastrais do profissional, dados da equipe, unidade vinculada e informações complementares de vínculo profissional-unidade da LFCES021.

    A chave principal de deduplicação é composta por data_particao, cpf, ine e cod_cbo. O modelo mantém apenas registros com CPF, INE e CBO preenchidos.

    O campo vinculo_equipe_ativo indica se o vínculo do profissional com a equipe está ativo, com base na ausência de dt_desligamento. Já vinculo_unidade_encontrado indica apenas se foi encontrado vínculo correspondente na LFCES021 para enriquecimento de carga horária, conselho e vínculo unidade; portanto, não deve ser interpretado como desligamento.

    O campo tipo_enriquecimento_vinculo_unidade indica se o enriquecimento foi feito por correspondência exata de CBO, por fallback profissional-unidade ou se não houve vínculo profissional-unidade encontrado.

