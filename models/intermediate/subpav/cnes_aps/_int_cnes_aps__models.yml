- name: int_subpav_cnes_aps__quantitativos_profissionais_equipes
  description: >-
    Modelo intermediário de quantitativos de profissionais por equipe, CBO e categoria profissional. Parte do modelo consolidado de profissionais e considera vínculos com equipe ativa, INE preenchido, CBO preenchido e carga horária ambulatorial maior ou igual a 20 horas.


    O modelo classifica os CBOs em categorias profissionais usadas nas regras de composição das equipes e de vacância do Panorama CNES. Os totais consideram profissionais ativos no vínculo de equipe, ou seja, registros sem data de desligamento. O campo inconsistente é propagado do consolidado de profissionais e indica possível múltiplo vínculo ativo do mesmo CPF, CNES e CBO em mais de uma equipe na mesma competência.

