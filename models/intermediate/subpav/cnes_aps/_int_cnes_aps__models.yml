- name: int_subpav_cnes_aps__profissionais_unidades
  description: >
    Modelo intermediário de vínculos entre profissionais, unidades e CBOs do CNES APS. Consolida os registros da LFCES021, enriquecendo com dados cadastrais do profissional e dados da unidade.

    A chave principal de deduplicação é composta por data_particao, cpf, cnes e cod_cbo. O modelo mantém apenas registros com CPF, CNES e CBO preenchidos.

    Este modelo representa o vínculo profissional-unidade-CBO e é usado como base para enriquecimento de carga horária, conselho profissional, vínculo, preceptoria e residência. A chave chave_profissional_unidade_cbo é composta por CPF + CNES + CBO e apoia a integração com vínculos de equipe.

    O campo possui_carga_horaria indica se há carga horária ambulatorial, hospitalar ou outras informada. Ausência de carga horária não significa ausência de vínculo; indica apenas que os campos de carga vieram zerados ou nulos na LFCES021.

