- name: int_subpav_cnes_aps__qpe_com_cbo_ausente
  description: >-
    Modelo intermediário que complementa os quantitativos profissionais por equipe com linhas sintéticas para categorias obrigatórias ausentes. A partir dos quantitativos reais por equipe, CBO e categoria, identifica categorias necessárias à composição da equipe que não aparecem na competência atual e cria linha sintética com total de profissionais igual a zero.


    Essas linhas permitem calcular vacância e incompletude por categoria profissional, considerando janela histórica de até quatro competências anteriores e impacto após ausência superior a 60 dias. O campo origem_linha_qpe diferencia linhas reais das linhas criadas para representar categoria obrigatória ausente.

