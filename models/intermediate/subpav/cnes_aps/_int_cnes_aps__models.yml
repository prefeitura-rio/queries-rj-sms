  - name: tipo_unidade_sms
    description: >
      Classificação SMS do tipo de unidade, derivada de nome fantasia, tipo de unidade, esfera administrativa e exceções documentadas. Possíveis valores incluem SMS, CAP, CF, CMS, CSE, CAPSIII, CAPSI, CAPS, POLICLINICA, UPA, CER, HOSPITAL e OUTROS.

  - name: is_unidade_aps_panorama
    description: >
      Flag oficial para reprodução do quadro de Unidades APS do Panorama CNES. Considera unidades ativas do município do Rio classificadas como CF, CMS ou CSE, com regras específicas por tipo: CF exige esfera municipal e tipo básico; CMS exige esfera municipal e nome compatível; CSE permite unidade federal desde que tenha tipo básico e nome compatível. Validada em 2026-04 contra o Panorama de referência, com UNIDADE_APS = 241, CF = 135, CMS = 103 e CSE = 3.

  - name: is_unidade_aps
    description: >
      Flag ampla indicando se a classificação tipo_unidade_sms é CF, CMS ou CSE. Esta flag serve para exploração geral da base, mas não deve ser usada para reproduzir o quadro de Unidades APS do Panorama.

