  description: Modelo intermediário de competências utilizadas no processamento histórico do CNES APS. Fornece a referência temporal mensal necessária para associar os snapshots do CNES, calcular o último dia de cada competência e apoiar janelas históricas de composição, vacância e incompletude.
  columns:
  - name: competencia_id
    description: Identificador da competência na base de referência temporal.
  - name: competencia
    description: Competência no formato AAAA-MM.
  - name: data_particao
    description: Data mensal de referência do snapshot CNES.
  - name: dt_final_competencia
    description: Último dia da competência.
  - name: dt_final_competencia_anterior
    description: Último dia da competência imediatamente anterior.
  - name: base_final
    description: Indicador de base final da competência, quando informado na origem.
  - name: created_at
    description: Timestamp de criação do registro na origem.
  - name: updated_at
    description: Timestamp da última atualização do registro na origem.
- name: int_subpav_cnes_aps__unidades
  description: >
    Modelo intermediário de unidades do CNES APS. Consolida os estabelecimentos a partir da raw LFCES004, enriquecendo com tabelas auxiliares de tipo de unidade, motivo de desativação, natureza jurídica e CNES válidos. Mantém o universo completo de estabelecimentos municipais, incluindo unidades públicas e privadas, para permitir usos futuros além do Panorama APS. Para reprodução do quadro de Unidades APS do Panorama SUBPAV, utilizar a flag is_unidade_aps_panorama.

    Regra de classificação de unidade APS para o Panorama: CF: unidade ativa, município Rio, esfera municipal, tipo de unidade básico e nome contendo CF ou Clínica da Família. CMS: unidade ativa, município Rio, esfera municipal e nome contendo CMS ou Centro Municipal de Saúde, sem exigir tipo_unidade_id 1/2, para contemplar unidades como SMS CMS Manoel Arthur Villaboim. CSE: unidade ativa, município Rio, tipo de unidade básico e nome contendo CSE ou Centro Saúde Escola, permitindo CSE federal como FIOCRUZ/ENSP/CSE Germano Sinval Faria. A classificação ampla tipo_unidade_sms é mantida para exploração, mas os indicadores do Panorama devem usar is_unidade_aps_panorama.
