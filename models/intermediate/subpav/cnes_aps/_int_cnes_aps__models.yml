- name: int_subpav_cnes_aps__equipes
  description: >
    Modelo intermediário de equipes do CNES APS. Consolida os registros da LFCES037, enriquecendo com unidade, tipo de equipe e motivo de desativação. Mantém a leitura ampla do CNES e cria flags específicas para reprodução do Panorama CNES.

    O modelo possui regras temporais para lidar com a mudança de tipologia do CNES: até 2020-04, equipes EACS são consideradas como ESF incompleta no Panorama histórico; a partir de 2020-05, o cálculo de APS passa a considerar ESF, EAP e ECR conforme a tipologia vigente. Para evitar ambiguidade, o modelo separa flags amplas do CNES de flags específicas de Panorama.

    Flags principais: is_equipe_aps_painel representa a regra da tipologia atual do painel. is_equipe_aps_historico representa a regra adequada para série histórica completa. is_esf_panorama_historico representa o campo ESF do Panorama, incluindo EACS no período antigo. is_eacs_panorama_historico representa o campo EACS apenas no período em que ele é exibido separadamente no Panorama histórico. is_eapp_panorama remove duplicidades de equipes prisionais PSIC. is_emad_panorama remove registros fora do recorte do Panorama, preservando is_emad como leitura ampla do CNES.

    Ressalva histórica: as competências 2020-05, 2020-06 e 2020-07 possuem raw LFCES037 incompleta na fonte atualmente disponível. Portanto, essas competências não conseguem reproduzir integralmente o comportamento anterior apenas por regra de transformação.

