        description: "Flag tratada indicando população privada de liberdade. Valor 1 para sim, 0 para não e null quando não informado."

      - name: pop_assist_conflito_lei
        description: "Flag tratada indicando população em conflito com a lei. Valor 1 para sim, 0 para não e null quando não informado."

