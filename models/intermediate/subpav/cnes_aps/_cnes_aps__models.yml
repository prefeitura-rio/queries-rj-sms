      - name: pop_assist_priv_liberdade_original
        description: "Valor original indicando população privada de liberdade."

      - name: pop_assist_conflito_lei_original
        description: "Valor original indicando população em conflito com a lei."

      - name: pop_assist_adol_conf_lei_original
        description: "Valor original indicando adolescente em conflito com a lei."

      - name: pop_assist_quilomb
        description: "Flag tratada indicando população assistida quilombola. Valor 1 para sim, 0 para não e null quando não informado."

      - name: pop_assist_assent
        description: "Flag tratada indicando população assistida de assentamento. Valor 1 para sim, 0 para não e null quando não informado."

      - name: pop_assist_geral
        description: "Flag tratada indicando população assistida geral. Valor 1 para sim, 0 para não e null quando não informado."

      - name: pop_assist_escola
        description: "Flag tratada indicando população assistida escolar. Valor 1 para sim, 0 para não e null quando não informado."

