        description: Identificador da equipe de saúde (não disponível no SIPNI, preenchido com NULL).
      - name: id_ine_equipe
        description: Identificador INE da equipe de saúde (não disponível no SIPNI, preenchido com NULL).
      - name: id_microarea
        description: Identificador da microárea (não disponível no SIPNI, preenchido com NULL).
      - name: estabelecimento_nome
