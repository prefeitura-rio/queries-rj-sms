  - name: int_vacinacao__sipni
    description: >
      Modelo intermediário que padroniza os dados de vacinação do SIPNI (Sistema de Informação
      do Programa Nacional de Imunizações). Algumas colunas são preenchidas com NULL pois não
      estão disponíveis na fonte SIPNI (equipe, obito, profissional_cbo/cns/cpf).
    columns:
      - name: id_vacinacao
        description: Identificador único da vacinação, composto por id_cnes e id local.
        data_tests:
          - unique:
              config:
                severity: warn
