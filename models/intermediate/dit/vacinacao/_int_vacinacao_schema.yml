      - name: profissional_cpf
        description: CPF do profissional (não disponível no SIPNI, preenchido com NULL).
        policy_tags:
          - '{{ var("TAG_CPF") }}'
      - name: loaded_at
        description: Data/hora de carga no Data Lake.
      - name: updated_at
        description: Data/hora da última atualização do registro.
      - name: data_particao
        description: Data de partição para otimização de consultas.
