      - name: paciente_nome
        description: Nome do paciente vacinado.
        policy_tags:
          - '{{ var("TAG_NOME") }}'
      - name: paciente_nascimento_data
        description: Data de nascimento do paciente.
        policy_tags:
          - '{{ var("TAG_DATA_NASCIMENTO") }}'
      - name: paciente_nome_mae
        description: Nome da mãe do paciente.
        policy_tags:
          - '{{ var("TAG_NOME_MAE") }}'
      - name: paciente_obito
        description: Indicador de óbito do paciente (não disponível no SIPNI, preenchido com NULL).
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: profissional_nome
        description: Nome do profissional de saúde que registrou a vacina.
        policy_tags:
          - '{{ var("TAG_NOME") }}'
      - name: profissional_cbo
        description: Código CBO do profissional (não disponível no SIPNI, preenchido com NULL).
      - name: profissional_cns
