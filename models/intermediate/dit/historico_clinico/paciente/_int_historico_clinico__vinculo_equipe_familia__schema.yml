models:
  - name: int_historico_clinico__vinculo_equipe_familia
    description: >
      Modelo intermediário que consolida o vínculo entre pacientes e suas equipes
      de família, considerando tanto pacientes com cadastro permanente quanto
      pacientes temporários elegíveis. A elegibilidade de pacientes temporários
      é determinada pela presença de mais de 5 consultas com médicos e/ou
      enfermeiros em acompanhamento contínuo na mesma unidade de saúde.
    columns:
      - name: id_paciente
        description: Identificador único do paciente no prontuário.
      - name: cpf_paciente
        description: CPF do paciente, quando disponível. É permitido paciente com CPF nulo.
      - name: cns_paciente
        description: Cartão Nacional de Saúde do paciente, quando disponível.
      - name: nome_paciente
        description: Nome completo do paciente,
      - name: mae_nome
        description: Nome da mãe do paciente,
      - name: data_nascimento
        description: Data de nascimento do paciente.
      - name: situacao
        description: "Situação do cadastro do paciente na unidade de saúde. Ex: Ativo, Óbito, Mudou-se área, etc."
      - name: cadastro_permanente_indicador
        description: >
          Indica se o paciente possui cadastro permanente (true) ou temporário
          (false) na unidade de saúde.
      - name: paciente_cpf_indicador
        description: Indica se o paciente possui CPF preenchido (true) ou não (false).
      - name: id_ine
        description: Identificador da equipe de saúde da família à qual o paciente está vinculado.
      - name: nome_equipe_familia
        description: Nome de referência da equipe de saúde da família.
      - name: id_cnes
        description: Código CNES da unidade de saúde à qual o paciente está vinculado.
      - name: nome_unidade
        description: Nome da unidade de saúde, formatado e padronizado.
      - name: cpf_profissional
        description: >
          CPF do profissional (restrito a médico ou enfermeiro) vinculado à equipe do paciente.
          Coluna utilizada para clusterização — filtrar por este campo barateia o custo da consulta pelos pacientes vinculados a um profissional.
      - name: cns_profissional
        description: Cartão Nacional de Saúde do profissional.
      - name: nome_profissional
        description: Nome completo do profissional.
      - name: id_profissional_sus
        description: Identificador do profissional no sistema do SUS.
      - name: tipo_profissional
        description: "Tipo do profissional vinculado à equipe. Valores possíveis: 'medico' ou 'enfermeiro'."
      - name: funcionario_ativo_indicador
        description: Indica se o profissional está ativo (true) ou inativo (false).
      - name: data_atualizacao_vinculo_equipe
        description: Data da última atualização do vínculo do paciente com a equipe.
      - name: data_ultima_atualizacao_cadastral
        description: Data da última atualização cadastral do paciente.
      - name: source_updated_at
        description: Timestamp da última atualização do registro na origem.
      - name: updated_at_rank
        description: Ranking de atualização utilizado como critério de desempate na deduplicação de vínculos.