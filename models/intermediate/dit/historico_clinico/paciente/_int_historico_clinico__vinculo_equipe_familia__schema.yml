models:
  - name: int_historico_clinico__vinculo_equipe_familia
    description: >
      Tabela intermediária que consolida o vínculo entre pacientes e profissionais
      de equipes de família no HCI. O modelo considera pacientes com id_ine preenchido
      e situação igual a Ativo, mantendo diretamente pacientes com cadastro permanente
      e, para pacientes não permanentes, apenas aqueles elegíveis por histórico de
      mais de 5 consultas consecutivas com médico ou enfermeiro na mesma unidade.
      O modelo também enriquece CPF faltante do paciente por meio da tabela indice,
      usando CNS como chave, e gera uma linha por relação profissional-paciente
      dentro da mesma equipe.

    columns:
      - name: id_paciente
        description: Identificador único do paciente na base de prontuário Vitacare.

      - name: cpf_paciente
        description: >
          CPF do paciente. Mantém o CPF original do prontuário quando preenchido
          e, quando ausente, é enriquecido via tabela indice a partir do CNS do paciente.
        policy_tags:
          - '{{ var("TAG_CPF") }}'

      - name: cns_paciente
        description: Cartão Nacional de Saúde do paciente.
        policy_tags:
          - '{{ var("TAG_CNS") }}'

      - name: nome_paciente
        description: Nome do paciente formatado.
        policy_tags:
          - '{{ var("TAG_NOME") }}'

      - name: mae_nome
        description: Nome da mãe do paciente formatado.
        policy_tags:
          - '{{ var("TAG_NOME_MAE") }}'

      - name: data_nascimento
        description: Data de nascimento do paciente.
        policy_tags:
          - '{{ var("TAG_DATA_NASCIMENTO") }}'

      - name: situacao
        description: >
          Situação cadastral do paciente na base de prontuário. O modelo mantém
          apenas pacientes com situação igual a Ativo.

      - name: cadastro_permanente_indicador
        description: >
          Indicador que informa se o paciente possui cadastro permanente. Pacientes
          com valor true entram diretamente no modelo; pacientes com valor false
          só entram se forem elegíveis pela regra de atendimentos.

      - name: id_ine
        description: Identificador da equipe de família à qual o paciente está vinculado.

      - name: nome_equipe_familia
        description: Nome da equipe de família vinculada ao paciente.

      - name: id_cnes
        description: >
          CNES da unidade associado ao vínculo final do paciente. É definido
          preferencialmente a partir da dimensão de equipe e, na ausência desta
          informação, a partir do cadastro do paciente.

      - name: nome_unidade
        description: Nome da unidade de saúde associada ao CNES final do vínculo.

      - name: cpf_profissional
        description: CPF do profissional de saúde vinculado à equipe do paciente.
        policy_tags:
          - '{{ var("TAG_CPF") }}'

      - name: cns_profissional
        description: CNS do profissional de saúde vinculado à equipe do paciente.
        policy_tags:
          - '{{ var("TAG_CNS") }}'

      - name: nome_profissional
        description: Nome do profissional de saúde vinculado à equipe do paciente.
        policy_tags:
          - '{{ var("TAG_NOME") }}'

      - name: id_profissional_sus
        description: Identificador SUS do profissional vinculado à equipe.

      - name: tipo_profissional
        description: Tipo do profissional na equipe (medico ou enfermeiro)

      - name: funcionario_ativo_indicador
        description: >
          Indicador que informa se o profissional está ativo, conforme dimensão
          de profissionais de saúde.

      - name: data_atualizacao_vinculo_equipe
        description: >
          Data de atualização do vínculo do paciente com a equipe de família.
          É utilizada como um dos critérios de priorização na deduplicação do vínculo.

      - name: data_ultima_atualizacao_cadastral
        description: >
          Data da última atualização cadastral do paciente, utilizada como critério
          de priorização na deduplicação do vínculo.

      - name: source_updated_at
        description: >
          Data de atualização do registro na fonte original, utilizada como critério
          adicional de ordenação na deduplicação.

      - name: updated_at_rank
        description: >
          Campo auxiliar de ordenação para priorização do registro mais recente
          na deduplicação do vínculo paciente-equipe.