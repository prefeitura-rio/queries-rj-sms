version: 2

models:
  - name: mart_subhue_paciente
    description: "Tabela de pacientes com dados normalizados e limpos, provenientes do prontuário Vitacare. Inclui informações demográficas e de endereço."
    columns:
      - name: cpf
        description: "CPF do paciente (apenas números)."
      - name: nome
        description: "Nome do paciente, normalizado."
      - name: nome_social
        description: "Nome social do paciente, normalizado."
      - name: data_nascimento
        description: "Data de nascimento do paciente."
      - name: sexo
        description: "Sexo do paciente (Feminino, Masculino)."
      - name: orientacao_sexual
        description: "Orientação sexual do paciente."
      - name: identidade_genero
        description: "Identidade de gênero do paciente."
      - name: raca
        description: "Raça/cor do paciente."
