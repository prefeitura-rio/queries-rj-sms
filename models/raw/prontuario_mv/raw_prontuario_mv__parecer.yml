version: 2

models:
  - name: raw_prontuario_mv__parecer
    description: "Tabela de pareceres médicos do Prontuário MV. Contém solicitações e respostas de pareceres entre profissionais e especialidades."
    columns:
      - name: id_hci
        description: "Identificador único para o atendimento gerada na materialização do DBT. Combinação de id_atendimento e id_cnes para garantir unicidade."
        policy_tags:
          - '{{ var("TAG_IDENTIFICADOR_SISTEMA") }}'
      - name: id_atendimento
        description: "Identificador único do atendimento."
        policy_tags:
          - '{{ var("TAG_IDENTIFICADOR_SISTEMA") }}'
      - name: id_cnes
        description: "Identificador CNES do estabelecimento de saúde."
      - name: estabelecimento_nome
        description: "Nome do estabelecimento de atendimento."
      - name: atendimento_datahora
        description: "Data e hora do atendimento original."
      - name: atendimento_tipo
        description: "Tipo de atendimento (ex: AMBULATORIAL, INTERNAÇÃO, URGÊNCIA)."
      - name: atendimento_especialidade
        description: "Especialidade do atendimento original."
      - name: profissional_nome
        description: "Nome do profissional de saúde que emitiu o parecer."
        policy_tags:
          - '{{ var("TAG_NOME") }}'
      - name: paciente_nome
        description: "Nome do paciente."
        policy_tags:
          - '{{ var("TAG_NOME") }}'
      - name: paciente_cpf
        description: "CPF do paciente."
        policy_tags:
          - '{{ var("TAG_CPF") }}'
      - name: paciente_cns
        description: "CNS do paciente."
        policy_tags:
          - '{{ var("TAG_CNS") }}'
      - name: paciente_nome_social
        description: "Nome social do paciente."
        policy_tags:
          - '{{ var("TAG_NOME") }}'
      - name: paciente_data_nascimento
        description: "Data de nascimento do paciente."
        policy_tags:
          - '{{ var("TAG_DATA_NASCIMENTO") }}'
      - name: paciente_sexo
        description: "Sexo do paciente."
      - name: paciente_pcd
        description: "Indicador se o paciente é Pessoa com Deficiência (PCD)."
      - name: paciente_mae_nome
        description: "Nome da mãe do paciente."
        policy_tags:
          - '{{ var("TAG_NOME_MAE") }}'
      - name: solicitacao_parecer_datahora
        description: "Data e hora da solicitação do parecer."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: solicitante_nome
        description: "Nome do profissional que solicitou o parecer."
      - name: especialidade_requisitada
        description: "Especialidade para a qual o parecer foi solicitado."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: solicitado_nome
        description: "Nome do profissional a quem o parecer foi solicitado."
        policy_tags:
          - '{{ var("TAG_NOME") }}'
      - name: parecer_situacao
        description: "Situação atual do parecer (ex: Atendido, Pendente)."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: solicitacao_justificativa
        description: "Justificativa para a solicitação do parecer."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: parecer_descricao
        description: "Descrição do parecer."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: parecer_datahora
        description: "Data e hora em que o parecer foi emitido."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: servico
        description: "Serviço relacionado ao parecer."
      - name: cid
        description: "Código CID relacionado ao parecer."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: loaded_at
        description: "Data e hora de carregamento dos dados no Datalake."
      - name: updated_at
        description: "Data e hora de atualização dos dados na origem."
      - name: data_particao
        description: "Data utilizada para particionamento dos dados, neste caso é a data de carregamento no Data Lake."