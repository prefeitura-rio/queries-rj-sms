          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: imc_descricao
        description: "Descrição da classificação do IMC."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: superficie_corporal
        description: "Superfície corporal em metros quadrados."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: dor_indicador
        description: "Indicador de dor."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: dor_escala
        description: "Escala de dor utilizada."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: dor_detalhes
        description: "Detalhes sobre a dor."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: hipotese_diagnostica
        description: "Hipótese diagnóstica."
      - name: diagnostico_provavel
        description: "Diagnóstico provável."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: cid
        description: "Código CID relacionado."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: exames_complementares
        description: "Descrição de exames complementares solicitados ou realizados."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: conduta_proposta
        description: "Conduta proposta para o caso."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: plano_terapeutico
        description: "Plano terapêutico definido."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: destino_paciente
        description: "Destino do paciente após o atendimento (ex: alta, internação)."
      - name: retorno_necessidade
        description: "Indicador da necessidade de retorno."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: retorno_data
        description: "Data agendada para o retorno."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: retorno_especialidade
        description: "Especialidade para o retorno."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: loaded_at
        description: "Data e hora de carregamento dos dados no Datalake."
      - name: updated_at
        description: "Data e hora de atualização dos dados na origem."
      - name: data_particao
        description: "Data utilizada para particionamento dos dados, neste caso é a data de carregamento no Data Lake."