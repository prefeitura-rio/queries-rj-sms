version: 2

models:
  - name: raw_prontuario_mv__anamnese
    description: "Tabela de anamnese do Prontuário MV. Contém o registro da entrevista inicial do atendimento ambulatorial com o paciente, incluindo queixas, histórico, exame físico e conduta."
    columns:
      - name: id_hci
        description: "Identificador único para o atendimento gerada na materialização do DBT. Combinação de id_atendimento e id_cnes para garantir unicidade."
        policy_tags:
          - '{{ var("TAG_IDENTIFICADOR_SISTEMA") }}'
      - name: id_atendimento
        description: "Identificador único do atendimento."
        policy_tags:
          - '{{ var("TAG_IDENTIFICADOR_SISTEMA") }}'
      - name: id_cnes
        description: "Identificador CNES do estabelecimento de saúde."
      - name: estabelecimento_nome
        description: "Nome do estabelecimento de atendimento."
      - name: atendimento_datahora
        description: "Data e hora do atendimento."
      - name: atendimento_tipo
        description: "Tipo de atendimento (ex: AMBULATORIAL, INTERNAÇÃO, URGÊNCIA)."
      - name: atendimento_especialidade
        description: "Especialidade do atendimento."
      - name: profissional_nome
        description: "Nome do profissional de saúde."
        policy_tags:
          - '{{ var("TAG_NOME") }}'
      - name: fechamento_datahora
        description: "Data e hora de fechamento do registro de anamnese."
      - name: paciente_nome
        description: "Nome do paciente."
        policy_tags:
          - '{{ var("TAG_NOME") }}'
      - name: paciente_cpf
        description: "CPF do paciente."
        policy_tags:
          - '{{ var("TAG_CPF") }}'
      - name: paciente_cns
        description: "CNS do paciente."
        policy_tags:
          - '{{ var("TAG_CNS") }}'
      - name: paciente_nome_social
        description: "Nome social do paciente."
        policy_tags:
          - '{{ var("TAG_NOME") }}'
      - name: paciente_data_nascimento
        description: "Data de nascimento do paciente."
        policy_tags:
          - '{{ var("TAG_DATA_NASCIMENTO") }}'
      - name: paciente_sexo
        description: "Sexo do paciente."
      - name: paciente_pcd
        description: "Indicador se o paciente é Pessoa com Deficiência (PCD)."
      - name: paciente_mae_nome
        description: "Nome da mãe do paciente."
        policy_tags:
          - '{{ var("TAG_NOME_MAE") }}'
      - name: queixa_principal
        description: "Queixa principal do paciente."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: historia_doenca_atual
        description: "História da doença atual."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: historia_pregressa
        description: "História médica pregressa do paciente."
      - name: historia_familiar
        description: "História médica familiar."
      - name: historia_social
        description: "História social do paciente."
      - name: medicamentos_em_uso
        description: "Indicador se o paciente faz uso de medicamentos."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: medicamentos_quais
        description: "Descrição de quais medicamentos o paciente usa."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: exame_fisico
        description: "Resultados do exame físico."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: sinais_vitais_ultimas_afericoes
        description: "Descrição das últimas aferições de sinais vitais."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: pressao_arterial_sistolica
        description: "Pressão arterial sistólica em mmHg."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: pressao_arterial_diastolica
        description: "Pressão arterial diastólica em mmHg."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: frequencia_cardiaca
        description: "Frequência cardíaca em batimentos por minuto."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: frequencia_respiratoria
        description: "Frequência respiratória em movimentos por minuto."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: temperatura
        description: "Temperatura corporal em graus Celsius."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: saturacao_oxigenio
        description: "Saturação de oxigênio (SpO2) em porcentagem."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: peso
        description: "Peso do paciente em quilogramas."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: altura
        description: "Altura do paciente em metros ou centímetros."
        policy_tags:
          - '{{ var("TAG_DADO_CLINICO") }}'
      - name: imc
        description: "Índice de Massa Corporal (IMC)."
